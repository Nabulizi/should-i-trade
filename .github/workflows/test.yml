name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify syntax (all Python files)
        run: python -m py_compile server.py data.py scoring.py analysis.py watchlist.py config.py models.py

      - name: Run infrastructure regression suite (test_fixes.py)
        run: python test_fixes.py

      - name: Run scoring pillar unit tests (test_scoring.py)
        run: python test_scoring.py

      - name: Run data-layer + circuit-breaker tests (test_data.py)
        run: python test_data.py

      - name: Run analysis / roundtable persona tests (test_analysis.py)
        run: python test_analysis.py

      - name: Set up Node
        if: matrix.python-version == '3.12'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dev dependencies
        if: matrix.python-version == '3.12'
        run: npm ci

      - name: JS lint
        if: matrix.python-version == '3.12'
        run: npm run lint

      - name: JS tests
        if: matrix.python-version == '3.12'
        run: npm test
