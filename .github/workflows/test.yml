name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify syntax (all Python files)
        run: python -m py_compile server.py data.py scoring.py analysis.py watchlist.py

      - name: Run infrastructure regression suite (test_fixes.py)
        run: python test_fixes.py

      - name: Run scoring pillar unit tests (test_scoring.py)
        run: python test_scoring.py
